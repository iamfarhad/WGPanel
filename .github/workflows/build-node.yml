name: build-node

# Publishes the production WireGuard node image (deploy/node.Dockerfile) to GHCR, so
# install-node.sh and install.sh's self-node can pull it instead of building on the
# host. The build context is the repo root because node.Dockerfile compiles the agent
# from backend/ and copies deploy/node-entrypoint.sh.
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "backend/**"
      - "deploy/node.Dockerfile"
      - "deploy/node-entrypoint.sh"
      - ".github/workflows/build-node.yml"
  pull_request:
    paths:
      - "backend/**"
      - "deploy/node.Dockerfile"
      - "deploy/node-entrypoint.sh"

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - run: go vet ./...
      - run: go test ./...

  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          # Matches NODE_IMAGE in deploy/.env.example - update both together if the org/repo changes.
          images: ghcr.io/${{ github.repository_owner }}/wgpanel-node
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          # Repo root - node.Dockerfile reads backend/ and deploy/node-entrypoint.sh.
          context: .
          file: deploy/node.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
