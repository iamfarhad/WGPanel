server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Mirrors Caddy's production routing (deploy/Caddyfile's `handle_path /api/*`) so
    # this container is a complete, self-contained demo on its own - reachable at
    # http://<host>:3000 with no domain/TLS/Caddy needed - not just a component that
    # only works behind Caddy. In production Caddy still terminates TLS and proxies
    # /api/* directly to the api service itself; requests only reach this block at all
    # when hitting the frontend container's port directly (local dev/demo, or Caddy's
    # own `handle` fallback for everything else).
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Client-side routing (react-router) - any path that isn't a real static
    # file falls back to index.html so deep links like /nodes work on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
