name: wgpanel

# Production compose. Dev-only concerns (building the api/frontend images from local
# source, and the in-Docker WireGuard test node) live in docker-compose.override.yml,
# which `docker compose` auto-merges ONLY when run from this repo's deploy/ dir. A
# production host installs just this file (see install.sh's setup_files), so it never
# builds images or runs the dev node - it pulls the CI-published images named by
# API_IMAGE/FRONTEND_IMAGE and runs exactly the five services below.

# Bounded container logs so a chatty or looping service can never fill the host disk -
# the single most common unattended-server outage. Applied to every service via the
# YAML anchor below. 10m x 5 = 50MB max per container.
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    # Pinned rather than :latest-pg16 - migration 0011 is the first one to depend on
    # specific TimescaleDB hypertable/retention-policy behavior (0001 only ever did
    # CREATE EXTENSION), so a floating tag silently changing that behavior under an
    # already-tested schema is a real risk now in a way it wasn't before. Pinned to
    # the exact digest resolved from :latest-pg16 at the time this was added
    # (TimescaleDB 2.28.2 on PostgreSQL 16.14) - bump deliberately, not by surprise.
    image: timescale/timescaledb@sha256:ba149561ad4ddff5940d6eb0a0df60aefd1355cee1a450928f271267038fc888
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - wgpanel_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          # Ceiling only (not a reservation) - protects the host from a runaway query.
          # Tune via DB_MEM_LIMIT in .env on larger deployments.
          memory: ${DB_MEM_LIMIT:-1g}

  redis:
    # Pinned to the tested digest (redis:7-alpine at time of writing) so an unattended
    # `wgpanel update` can't pull a surprise minor - bump deliberately.
    image: redis:7-alpine@sha256:ee64a64eaab618d88051c3ade8f6352d11531fcf79d9a4818b9b183d8c1d18ba
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    # maxmemory caps host impact; the policy is deliberately `noeviction`, NOT an LRU:
    # Redis here stores refresh tokens (authcrypto/jwt.go), so evicting keys under
    # pressure would silently sign admins out. noeviction instead fails new writes if
    # the (generous) ceiling is ever hit - which for a token store it never should be.
    # Persistence is left at the image default (RDB snapshots to the volume, plus a
    # final save on graceful shutdown) so tokens survive restarts.
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD}"
      - "--maxmemory"
      - "${REDIS_MAXMEMORY:-256mb}"
      - "--maxmemory-policy"
      - "noeviction"
    volumes:
      - wgpanel_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM_LIMIT:-384m}

  api:
    image: ${API_IMAGE}
    restart: unless-stopped
    logging: *default-logging
    # The api is a static Go binary running as a non-root distroless user on high ports
    # (8080, NODE_AGENT_PORT) - it needs no Linux capabilities at all, so drop them all.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      API_HMAC_MASTER_KEY: ${API_HMAC_MASTER_KEY}
      NODE_AGENT_PORT: ${NODE_AGENT_PORT}
      NODE_AGENT_JOIN_TOKEN_TTL_MIN: ${NODE_AGENT_JOIN_TOKEN_TTL_MIN}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      ACCOUNT_KEY_ENCRYPTION_KEY: ${ACCOUNT_KEY_ENCRYPTION_KEY}
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-admin}
      # docs/STORY-10-monitoring-and-domain-management.md, Part 2 - live domain push
      # via Caddy's admin API over the shared wgpanel_caddy_admin volume below.
      ADMIN_ACL_EMAIL: ${ADMIN_ACL_EMAIL}
      CADDY_ADMIN_SOCKET: /admin/caddy-admin.sock
    ports:
      # Not reachable from the public internet (127.0.0.1-only + Caddy doesn't proxy /internal/*),
      # but that alone doesn't stop a sibling container (frontend, caddy) on this same compose
      # network from calling api:8080/internal/* directly - the real gate is INTERNAL_API_TOKEN,
      # checked by the middleware on every /internal/* request regardless of caller.
      - "127.0.0.1:${API_PORT}:8080"
      - "${NODE_AGENT_PORT}:${NODE_AGENT_PORT}" # node agents connect here over the public internet (mTLS)
    volumes:
      - wgpanel_api_data:/data
      # Shared ONLY with caddy below (never frontend - a meaningfully weaker trust
      # boundary since it just serves static assets) - see internal/caddyadmin's doc
      # comment for why this needs to be a Unix socket, not Caddy's TCP admin default.
      - wgpanel_caddy_admin:/admin
    healthcheck:
      # Native subcommand on the same binary (backend/cmd/api/main.go) - avoids depending on
      # wget/curl existing in the distroless final image. Hits the public, unauthenticated
      # GET /healthz (docs/PRD-security-access-control.md §5), not /internal/healthz - no
      # X-Internal-Token is available to Docker's healthcheck runner anyway.
      test: ["CMD", "/wgpanel-api", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: ${API_MEM_LIMIT:-512m}

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    depends_on:
      api:
        condition: service_healthy
    ports:
      # Loopback-only; Caddy reaches the frontend over the compose network, not this.
      # High default port to avoid the very common :3000 clash (dev servers, Grafana, …).
      - "127.0.0.1:${FRONTEND_PORT:-48088}:80"
    healthcheck:
      # busybox wget ships in nginx:alpine; a 200 on / (the SPA index) means nginx is
      # serving. Lets caddy wait on service_healthy instead of just service_started.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: ${FRONTEND_MEM_LIMIT:-128m}

  caddy:
    # Pinned to the tested digest (caddy:2-alpine at time of writing) - bump deliberately.
    image: caddy:2-alpine@sha256:e2e3a089760c453bc51c4e718342bd7032d6714f15b437db7121bfc2de2654a6
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      # Host-side ports are configurable (PANEL_HTTP_PORT/PANEL_HTTPS_PORT in .env) -
      # Caddy itself still binds :80/:443 inside the container either way, since
      # that's what its automatic-HTTPS/ACME logic assumes internally.
      - "${PANEL_HTTP_PORT:-80}:80"
      - "${PANEL_HTTPS_PORT:-443}:443"
    environment:
      PANEL_DOMAIN: ${PANEL_DOMAIN}
      ADMIN_ACL_EMAIL: ${ADMIN_ACL_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - wgpanel_caddy_data:/data
      - wgpanel_caddy_config:/config
      - wgpanel_caddy_admin:/admin
    deploy:
      resources:
        limits:
          memory: ${CADDY_MEM_LIMIT:-256m}

volumes:
  wgpanel_db_data:
  wgpanel_redis_data:
  wgpanel_api_data:
  wgpanel_caddy_data:
  wgpanel_caddy_config:
  wgpanel_caddy_admin:
